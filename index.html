<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELYTRA - Connexion</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div style="position: absolute; top: 20px; right: 20px;">
        <button id="theme-toggle-btn" 
                onclick="toggleThemeFromLogin()" 
                style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-size: 1.2em;">
            ☀️
        </button>
    </div>
    <div class="auth-screen"> 
        <div class="glass-card" style="padding: 40px; width: 380px; text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 10px;">🦋</div>
            <h1 style="font-size: 1.8rem; margin-bottom: 5px;">ELYTRA</h1>
            <p style="color: rgba(255,255,255,0.5); margin-bottom: 30px;">Interface Élève & Surveillant</p>
            
            <div class="login-input-group">
                <input type="text" id="username" placeholder="Identifiant">
            </div>
            
            <div class="login-input-group" style="margin-bottom: 5px;">
                <input type="password" id="password" placeholder="Mot de passe">
                <button class="login-btn-circle" onclick="connexion()">
                    <span style="color: black; font-size: 1.2rem;">→</span>
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
